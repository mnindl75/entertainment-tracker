<mat-card>
    <mat-card-title>Search</mat-card-title>

    <mat-card-content>
        <mat-form-field appearance="outline" class="full">
            <mat-label>Movie or series title</mat-label>

            <input
                matInput
                type="text"
                [formControl]="titleCtrl"
                [matAutocomplete]="auto"
                placeholder="Type at least 3 characters"
            />

            <mat-autocomplete
                #auto="matAutocomplete"
                [displayWith]="displayMovie"
                (optionSelected)="onSelected($event.option.value)"
            >
                <mat-option *ngFor="let m of results()" [value]="m">
                    {{ m.Title }} ({{ m.Year }}) — {{ m.Type }}
                </mat-option>
            </mat-autocomplete>

            <mat-hint>Example: “Matrix”, “Breaking Bad”</mat-hint>
        </mat-form-field>
        <mat-card class="selected" *ngIf="selected() as s">
            <mat-card-title>{{ s.Title }} ({{ s.Year }})</mat-card-title>
            <mat-card-subtitle>{{ s.Type }} — {{ s.imdbID }}</mat-card-subtitle>

            <mat-card-actions align="end">
                <button mat-button (click)="clearSearch()">Clear</button>
                <button mat-raised-button (click)="addToLibrary(s)">Add to library</button>
            </mat-card-actions>
        </mat-card>

        <div class="row" *ngIf="loading()">
            <mat-progress-spinner diameter="24" mode="indeterminate"></mat-progress-spinner>
            <span>Searching…</span>
        </div>

        <div class="error" *ngIf="error()">{{ error() }}</div>
    </mat-card-content>
</mat-card>

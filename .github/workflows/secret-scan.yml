name: Security - Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure local environment file is not tracked
        run: |
          if git ls-files --error-unmatch movieLista/environments/environments.local.ts >/dev/null 2>&1; then
            echo "ERROR: movieLista/environments/environments.local.ts must not be tracked."
            exit 1
          fi

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


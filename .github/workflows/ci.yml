name: CI – Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: movieLista/package-lock.json

      - name: Install dependencies
        working-directory: movieLista
        run: npm ci

      # Inject API keys from GitHub Secrets into environments.ts
      # Go to: GitHub Repo → Settings → Secrets and variables → Actions
      # Add: TMDB_TOKEN, GOOGLE_BOOKS_API_KEY, RAWG_API_KEY
      - name: Inject API keys
        working-directory: movieLista
        run: |
          sed -i "s|tmdbToken:.*|tmdbToken: '${{ secrets.TMDB_TOKEN }}',|" environments/environments.ts
          sed -i "s|googleBooksApiKey:.*|googleBooksApiKey: '${{ secrets.GOOGLE_BOOKS_API_KEY }}',|" environments/environments.ts
          sed -i "s|rawgApiKey:.*|rawgApiKey: '${{ secrets.RAWG_API_KEY }}'|" environments/environments.ts

      - name: Run tests
        working-directory: movieLista
        run: npm test

      - name: Build (production)
        working-directory: movieLista
        run: npm run build -- --base-href=/${{ github.event.repository.name }}/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: movieLista/dist/movie-lista/browser
          retention-days: 1


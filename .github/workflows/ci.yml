name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: movieLista/package-lock.json

      - name: Install dependencies
        working-directory: movieLista
        run: npm ci

      - name: Inject API keys
        working-directory: movieLista
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const filePath = 'environments/environments.ts';
          let content = fs.readFileSync(filePath, 'utf8');

          const replaceKey = (key, value) => {
            const escaped = String(value ?? '')
              .replace(/\\/g, '\\\\')
              .replace(/'/g, "\\'");
            const pattern = new RegExp(`(${key}:\\s*)'[^']*'`, 's');

            if (!pattern.test(content)) {
              throw new Error(`Key not found in ${filePath}: ${key}`);
            }

            content = content.replace(pattern, `$1'${escaped}'`);
          };

          replaceKey('tmdbToken', process.env.TMDB_TOKEN);
          replaceKey('googleBooksApiKey', process.env.GOOGLE_BOOKS_API_KEY);
          replaceKey('rawgApiKey', process.env.RAWG_API_KEY);

          fs.writeFileSync(filePath, content);
          NODE

      - name: Run tests
        working-directory: movieLista
        run: npm test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: movieLista/package-lock.json

      - name: Install dependencies
        working-directory: movieLista
        run: npm ci

      - name: Inject API keys
        working-directory: movieLista
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const filePath = 'environments/environments.ts';
          let content = fs.readFileSync(filePath, 'utf8');

          const replaceKey = (key, value) => {
            const escaped = String(value ?? '')
              .replace(/\\/g, '\\\\')
              .replace(/'/g, "\\'");
            const pattern = new RegExp(`(${key}:\\s*)'[^']*'`, 's');

            if (!pattern.test(content)) {
              throw new Error(`Key not found in ${filePath}: ${key}`);
            }

            content = content.replace(pattern, `$1'${escaped}'`);
          };

          replaceKey('tmdbToken', process.env.TMDB_TOKEN);
          replaceKey('googleBooksApiKey', process.env.GOOGLE_BOOKS_API_KEY);
          replaceKey('rawgApiKey', process.env.RAWG_API_KEY);

          fs.writeFileSync(filePath, content);
          NODE

      - name: Install Playwright browser
        working-directory: movieLista
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: movieLista
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: movieLista/playwright-report
          retention-days: 3

      - name: Upload E2E test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: movieLista/test-results
          retention-days: 3

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, e2e]
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: movieLista/package-lock.json

      - name: Install dependencies
        working-directory: movieLista
        run: npm ci

      - name: Inject API keys
        working-directory: movieLista
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const filePath = 'environments/environments.ts';
          let content = fs.readFileSync(filePath, 'utf8');

          const replaceKey = (key, value) => {
            const escaped = String(value ?? '')
              .replace(/\\/g, '\\\\')
              .replace(/'/g, "\\'");
            const pattern = new RegExp(`(${key}:\\s*)'[^']*'`, 's');

            if (!pattern.test(content)) {
              throw new Error(`Key not found in ${filePath}: ${key}`);
            }

            content = content.replace(pattern, `$1'${escaped}'`);
          };

          replaceKey('tmdbToken', process.env.TMDB_TOKEN);
          replaceKey('googleBooksApiKey', process.env.GOOGLE_BOOKS_API_KEY);
          replaceKey('rawgApiKey', process.env.RAWG_API_KEY);

          fs.writeFileSync(filePath, content);
          NODE

      - name: Build (production)
        working-directory: movieLista
        run: npm run build -- --base-href=/${{ github.event.repository.name }}/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: movieLista/dist/movie-lista/browser
          retention-days: 3

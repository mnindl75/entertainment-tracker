name: Deploy - GitHub Pages

on:
  workflow_run:
    workflows: ["CI - Build & Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download CI artifact
        if: ${{ github.event_name == 'workflow_run' }}
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: dist
          path: site

      - name: Build fallback for manual run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: movieLista/package-lock.json

      - name: Install dependencies
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: movieLista
        run: npm ci

      - name: Inject API keys
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: movieLista
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const filePath = 'environments/environments.ts';
          let content = fs.readFileSync(filePath, 'utf8');

          const replaceKey = (key, value) => {
            const escaped = String(value ?? '')
              .replace(/\\/g, '\\\\')
              .replace(/'/g, "\\'");
            const pattern = new RegExp(`(${key}:\\s*)'[^']*'`, 's');

            if (!pattern.test(content)) {
              throw new Error(`Key not found in ${filePath}: ${key}`);
            }

            content = content.replace(pattern, `$1'${escaped}'`);
          };

          replaceKey('tmdbToken', process.env.TMDB_TOKEN);
          replaceKey('googleBooksApiKey', process.env.GOOGLE_BOOKS_API_KEY);
          replaceKey('rawgApiKey', process.env.RAWG_API_KEY);

          fs.writeFileSync(filePath, content);
          NODE

      - name: Build (manual fallback)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: movieLista
        run: npm run build -- --base-href=/${{ github.event.repository.name }}/

      - name: Copy fallback artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          mkdir -p site
          cp -r movieLista/dist/movie-lista/browser/. site/

      - name: Copy index.html as 404.html
        run: cp site/index.html site/404.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


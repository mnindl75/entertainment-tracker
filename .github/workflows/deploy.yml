name: Deploy – GitHub Pages

on:
  # Nur deployen wenn CI auf main erfolgreich war
  workflow_run:
    workflows: ["CI – Build & Test"]
    types: [completed]
    branches: [main]

# GitHub Pages benötigt diese Rechte
permissions:
  contents: read
  pages: write
  id-token: write

# Gleichzeitige Deployments verhindern
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: movieLista/package-lock.json

      - name: Install dependencies
        working-directory: movieLista
        run: npm ci

      - name: Inject API keys
        working-directory: movieLista
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const filePath = 'environments/environments.ts';
          let content = fs.readFileSync(filePath, 'utf8');

          const replaceKey = (key, value) => {
            const escaped = String(value ?? '')
              .replace(/\\/g, '\\\\')
              .replace(/'/g, "\\'");
            const pattern = new RegExp(`(${key}:\\s*)'[^']*'`, 's');

            if (!pattern.test(content)) {
              throw new Error(`Key not found in ${filePath}: ${key}`);
            }

            content = content.replace(pattern, `$1'${escaped}'`);
          };

          replaceKey('tmdbToken', process.env.TMDB_TOKEN);
          replaceKey('googleBooksApiKey', process.env.GOOGLE_BOOKS_API_KEY);
          replaceKey('rawgApiKey', process.env.RAWG_API_KEY);

          fs.writeFileSync(filePath, content);
          NODE

      - name: Build (production)
        working-directory: movieLista
        run: npm run build -- --base-href=/${{ github.event.repository.name }}/

      # SPA-Fix: 404 → index.html weiterleiten (Angular Router funktioniert so auf GitHub Pages)
      - name: Copy index.html as 404.html
        run: cp movieLista/dist/movie-lista/browser/index.html movieLista/dist/movie-lista/browser/404.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: movieLista/dist/movie-lista/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

